name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build + test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test --parallel

      - name: Smoke test CLI
        run: |
          BIN=$(swift build -c release --show-bin-path)/vault
          $BIN version
          $BIN help
          # Use the test fixtures as a fake save folder for end-to-end smoke
          rm -rf /tmp/vault-ci
          $BIN scan --save-dir Tests/VaultCoreTests/Fixtures --out /tmp/vault-ci/history.json --quiet
          $BIN stats --out /tmp/vault-ci/history.json --no-color
          $BIN export --out /tmp/vault-ci/history.json | head -3
