name: TheVault
options:
  bundleIdPrefix: com.coreycrooks
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO

packages:
  VaultCore:
    path: ../TheVault

targets:
  TheVault:
    type: application
    platform: macOS
    # Asset catalogs must be part of the target. A bare `resources:` folder was
    # not producing a PBXResourcesBuildPhase in generated Xcode projects, which
    # meant zero images shipped in the .app — SwiftUI showed empty placeholders.
    sources:
      - path: App
      - path: Resources/Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "The Vault"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "© 2026 Corey Crooks"
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
        # Custom URL scheme so Steam OpenID can deep-link results back to us.
        CFBundleURLTypes:
          - CFBundleURLName: com.coreycrooks.thevault.auth
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - thevault
        # Required for App Sandbox-style network access (we keep sandbox off
        # for now, but this suppresses any over-cautious system warnings).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # We open Steam via NSWorkspace.open(URL); declaring the schemes here
        # silences the "untrusted scheme" prompt on macOS 14+.
        LSApplicationQueriesSchemes:
          - steam
    settings:
      base:
        PRODUCT_NAME: "The Vault"
        PRODUCT_BUNDLE_IDENTIFIER: com.coreycrooks.thevault.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: VaultCore
        product: VaultCore
