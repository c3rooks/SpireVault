<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spire Vault">
  <!--
    Spire Vault brand mark.

    Hand-coded geometry: an octagonal vault door (8-sided, distinct from a
    plain circle), a gold rim, four cardinal tick marks (rivets), and a
    centered triangular spire breaking through the dial line.

    Palette pulled from Site/styles.css:
      gold       #d4af37
      accent     #ff6b1a
      accent-hi  #ffa05c
      bg         #0c0a14
      bg-deep    #06040a
  -->
  <defs>
    <linearGradient id="spireGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#ffa05c"/>
      <stop offset="0.55" stop-color="#ff6b1a"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
    <radialGradient id="dialGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1a1626"/>
      <stop offset="1" stop-color="#06040a"/>
    </radialGradient>
  </defs>

  <path d="M 32 3 L 53.5 11.5 L 61 32 L 53.5 52.5 L 32 61 L 10.5 52.5 L 3 32 L 10.5 11.5 Z"
        fill="url(#dialGlow)" stroke="#d4af37" stroke-width="2" stroke-linejoin="round"/>

  <circle cx="32" cy="32" r="20" fill="none" stroke="#d4af37" stroke-width="0.75" stroke-opacity="0.55"/>

  <rect x="31" y="7"  width="2" height="4" fill="#d4af37"/>
  <rect x="31" y="53" width="2" height="4" fill="#d4af37"/>
  <rect x="7"  y="31" width="4" height="2" fill="#d4af37"/>
  <rect x="53" y="31" width="4" height="2" fill="#d4af37"/>

  <path d="M 32 12 L 42 44 L 22 44 Z" fill="url(#spireGrad)"/>
  <path d="M 32 12 L 32 44 L 22 44 Z" fill="#06040a" fill-opacity="0.18"/>

  <rect x="20" y="44" width="24" height="3" rx="1" fill="#d4af37"/>
</svg>
