<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1626"/>
      <stop offset="100%" stop-color="#06040a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1626"/>
      <stop offset="100%" stop-color="#14111e"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="220" height="900" fill="#0c0a14" stroke="#28233a"/>
  <rect x="20" y="20" width="32" height="32" rx="6" fill="#d4af37" opacity="0.5"/>
  <rect x="60" y="26" width="120" height="9" rx="2" fill="#f4eddc" opacity="0.85"/>
  <rect x="60" y="40" width="80" height="7" rx="2" fill="#6c647a"/>
  <rect x="20" y="100" width="60" height="8" rx="2" fill="#6c647a"/>
  <g font-family="Inter" font-size="13" fill="#b6abc4">
    <rect x="14" y="125" width="192" height="34" rx="6" fill="#ff6b1a" opacity="0.18"/>
    <text x="44" y="146">Overview</text>
    <text x="44" y="186">Characters</text>
    <text x="44" y="226">Ascensions</text>
    <text x="44" y="266">Top Relics</text>
    <text x="44" y="306">Cards</text>
    <text x="44" y="346">Recent Runs</text>
    <text x="20" y="402" fill="#6c647a" font-size="10" font-weight="700" letter-spacing="2">COMMUNITY</text>
    <text x="44" y="426">Co-op</text>
  </g>

  <!-- header -->
  <g font-family="Playfair Display, serif">
    <text x="260" y="74" font-size="32" font-weight="900" fill="#f4eddc">Overview</text>
  </g>
  <text x="260" y="100" font-family="Inter" font-size="13" fill="#b6abc4">379 runs analyzed · last sync 2m ago</text>

  <!-- hero stats -->
  <rect x="260" y="140" width="540" height="160" rx="14" fill="url(#card)" stroke="#28233a"/>
  <text x="290" y="180" font-family="Inter" font-size="11" font-weight="800" fill="#d4af37" letter-spacing="2">WINRATE</text>
  <text x="290" y="240" font-family="Playfair Display, serif" font-size="56" font-weight="900" fill="#6dd97c">42<tspan font-size="32">%</tspan></text>
  <text x="290" y="278" font-family="Inter" font-size="13" fill="#b6abc4">158 wins / 379 runs</text>

  <rect x="820" y="140" width="380" height="160" rx="14" fill="url(#card)" stroke="#28233a"/>
  <text x="850" y="180" font-family="Inter" font-size="11" font-weight="800" fill="#d4af37" letter-spacing="2">MAX ASCENSION</text>
  <text x="850" y="240" font-family="Playfair Display, serif" font-size="56" font-weight="900" fill="#ffa05c">A14</text>
  <text x="850" y="278" font-family="Inter" font-size="13" fill="#b6abc4">Master tier</text>

  <!-- character grid -->
  <g font-family="Inter">
    <rect x="260" y="330" width="940" height="180" rx="14" fill="url(#card)" stroke="#28233a"/>
    <text x="290" y="362" font-size="11" font-weight="800" fill="#6c647a" letter-spacing="2">BY CHARACTER</text>

    <g transform="translate(290, 384)">
      <rect width="195" height="106" rx="10" fill="#0c0a14" stroke="#28233a"/>
      <text x="16" y="32" font-size="12" font-weight="800" fill="#ff5f6d">IRONCLAD</text>
      <text x="16" y="68" font-size="28" font-weight="900" fill="#f4eddc">48%</text>
      <text x="16" y="90" font-size="11" fill="#6c647a">112 runs · max A14</text>
    </g>
    <g transform="translate(495, 384)">
      <rect width="195" height="106" rx="10" fill="#0c0a14" stroke="#28233a"/>
      <text x="16" y="32" font-size="12" font-weight="800" fill="#9b83ff">SILENT</text>
      <text x="16" y="68" font-size="28" font-weight="900" fill="#f4eddc">39%</text>
      <text x="16" y="90" font-size="11" fill="#6c647a">95 runs · max A11</text>
    </g>
    <g transform="translate(700, 384)">
      <rect width="195" height="106" rx="10" fill="#0c0a14" stroke="#28233a"/>
      <text x="16" y="32" font-size="12" font-weight="800" fill="#50a0ff">DEFECT</text>
      <text x="16" y="68" font-size="28" font-weight="900" fill="#f4eddc">36%</text>
      <text x="16" y="90" font-size="11" fill="#6c647a">88 runs · max A9</text>
    </g>
    <g transform="translate(905, 384)">
      <rect width="195" height="106" rx="10" fill="#0c0a14" stroke="#28233a"/>
      <text x="16" y="32" font-size="12" font-weight="800" fill="#ffd278">REGENT</text>
      <text x="16" y="68" font-size="28" font-weight="900" fill="#f4eddc">44%</text>
      <text x="16" y="90" font-size="11" fill="#6c647a">84 runs · max A12</text>
    </g>
  </g>

  <!-- ascension chart -->
  <rect x="260" y="540" width="940" height="280" rx="14" fill="url(#card)" stroke="#28233a"/>
  <text x="290" y="572" font-family="Inter" font-size="11" font-weight="800" fill="#6c647a" letter-spacing="2">ASCENSION PROGRESSION</text>
  <g stroke="#28233a" stroke-dasharray="2 4">
    <line x1="290" y1="640" x2="1170" y2="640"/>
    <line x1="290" y1="700" x2="1170" y2="700"/>
    <line x1="290" y1="760" x2="1170" y2="760"/>
  </g>
  <polyline points="290,780 360,760 430,720 500,710 570,680 640,665 710,650 780,640 850,620 920,605 990,595 1060,580 1130,565 1170,540" stroke="#ff6b1a" stroke-width="3" fill="none"/>
  <polyline points="290,780 360,760 430,720 500,710 570,680 640,665 710,650 780,640 850,620 920,605 990,595 1060,580 1130,565 1170,540 1170,800 290,800" fill="#ff6b1a" opacity="0.12"/>
  <g font-family="Inter" font-size="10" fill="#6c647a">
    <text x="290" y="816">Apr</text>
    <text x="500" y="816">May</text>
    <text x="710" y="816">Jun</text>
    <text x="920" y="816">Jul</text>
    <text x="1130" y="816">now</text>
  </g>
</svg>
