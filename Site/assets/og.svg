<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a14"/>
      <stop offset="1" stop-color="#1a1428"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.35" r="0.55">
      <stop offset="0"   stop-color="#f4c75e" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#a45ef4" stop-opacity="0.18"/>
      <stop offset="1"   stop-color="#0c0a14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#f4c75e"/>
      <stop offset="0.55" stop-color="#f4885e"/>
      <stop offset="1"    stop-color="#a45ef4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- vault emblem -->
  <g transform="translate(900,140)">
    <circle r="160" fill="#1a1428" stroke="url(#grad)" stroke-width="3"/>
    <circle r="120" fill="none"     stroke="#f4c75e"   stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="32" font-family="'Playfair Display', Georgia, serif" font-size="170" font-weight="900"
          text-anchor="middle" fill="url(#grad)">V</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="190" font-family="Inter, system-ui, sans-serif" font-size="22"
        font-weight="600" letter-spacing="6" fill="#f4c75e">FREE · OPEN SOURCE · NO SIGNUP</text>

  <!-- headline -->
  <text x="80" y="280" font-family="'Playfair Display', Georgia, serif" font-size="76"
        font-weight="900" fill="#f3eee5">Find a co-op partner</text>
  <text x="80" y="362" font-family="'Playfair Display', Georgia, serif" font-size="76"
        font-weight="900" fill="url(#grad)">at your skill level.</text>

  <!-- sub -->
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="28"
        font-weight="500" fill="#c9c2d6">A live feed of every Slay the Spire 2 player using</text>
  <text x="80" y="468" font-family="Inter, system-ui, sans-serif" font-size="28"
        font-weight="500" fill="#c9c2d6">Spire Vault right now. Sign in with Steam. Reach out. Play.</text>

  <!-- url chip -->
  <g transform="translate(80,540)">
    <rect width="280" height="50" rx="25" fill="rgba(244,199,94,0.12)" stroke="#f4c75e" stroke-width="1.5"/>
    <text x="140" y="33" font-family="Inter, system-ui, sans-serif" font-size="20"
          font-weight="700" letter-spacing="1" text-anchor="middle" fill="#f4c75e">spirevault.app</text>
  </g>
  <g transform="translate(380,540)">
    <rect width="320" height="50" rx="25" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <text x="160" y="33" font-family="Inter, system-ui, sans-serif" font-size="20"
          font-weight="600" letter-spacing="1" text-anchor="middle" fill="#c9c2d6">github.com/c3rooks/SpireVault</text>
  </g>
</svg>
